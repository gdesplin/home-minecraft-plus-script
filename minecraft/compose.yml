# minecraft/compose.yml
# Paper Minecraft server using itzg/minecraft-server
# Docs: https://docker-minecraft-server.readthedocs.io/
#
# Usage:
#   cd /opt/minecraft
#   docker compose up -d
#   docker compose logs -f
#
# All configuration via .env (copy .env.example → .env and edit).

services:
  mc:
    image: itzg/minecraft-server:java21
    container_name: mc
    restart: unless-stopped
    stdin_open: true
    tty: true

    ports:
      # Minecraft game port — exposed to the world
      - "25565:25565"
      # RCON — bound to localhost only for security
      - "127.0.0.1:25575:25575"

    environment:
      # ── Required ─────────────────────────────────────────────────────────
      EULA: "${EULA:-FALSE}"

      # ── Server type and version ───────────────────────────────────────────
      TYPE: "${TYPE:-PAPER}"
      VERSION: "${MC_VERSION:-LATEST}"

      # ── Memory ───────────────────────────────────────────────────────────
      MEMORY: "${MEMORY:-4G}"

      # ── Server identity ───────────────────────────────────────────────────
      MOTD: "${MOTD:-A Paper Minecraft Server}"
      DIFFICULTY: "${DIFFICULTY:-normal}"
      MAX_PLAYERS: "${MAX_PLAYERS:-10}"
      ONLINE_MODE: "${ONLINE_MODE:-true}"

      # ── Performance tuning ────────────────────────────────────────────────
      # View distance (chunks). 8 is a good balance for 10 players on 4 GB.
      VIEW_DISTANCE: "${VIEW_DISTANCE:-8}"
      SIMULATION_DISTANCE: "${SIMULATION_DISTANCE:-6}"

      # JVM flags — G1GC tuned for Paper
      JVM_XX_OPTS: >-
        -XX:+UseG1GC
        -XX:+ParallelRefProcEnabled
        -XX:MaxGCPauseMillis=200
        -XX:+UnlockExperimentalVMOptions
        -XX:+DisableExplicitGC
        -XX:+AlwaysPreTouch
        -XX:G1NewSizePercent=30
        -XX:G1MaxNewSizePercent=40
        -XX:G1HeapRegionSize=8M
        -XX:G1ReservePercent=20
        -XX:G1HeapWastePercent=5
        -XX:G1MixedGCCountTarget=4
        -XX:InitiatingHeapOccupancyPercent=15
        -XX:G1MixedGCLiveThresholdPercent=90
        -XX:G1RSetUpdatingPauseTimePercent=5
        -XX:SurvivorRatio=32
        -XX:+PerfDisableSharedMem
        -XX:MaxTenuringThreshold=1

      # ── RCON (needed for safe backups and admin commands) ──────────────────
      ENABLE_RCON: "${ENABLE_RCON:-true}"
      RCON_PORT: "25575"
      RCON_PASSWORD: "${RCON_PASSWORD:-changeme_rcon_secret}"

      # ── Optional overrides ────────────────────────────────────────────────
      # OPS: "${OPS:-}"                     # comma-separated op usernames
      # WHITELIST: "${WHITELIST:-}"          # comma-separated whitelisted usernames
      # ENFORCE_WHITELIST: "${ENFORCE_WHITELIST:-false}"
      # LEVEL_SEED: "${LEVEL_SEED:-}"        # custom world seed

    volumes:
      # World data + config persisted here
      - ./data:/data

    # Resource limits — prevents Minecraft from starving the OS
    deploy:
      resources:
        limits:
          memory: "${CONTAINER_MEMORY_LIMIT:-5g}"

    # Healthcheck — pings the server query port
    healthcheck:
      test: mc-health
      start_period: 90s
      interval: 30s
      timeout: 10s
      retries: 3
